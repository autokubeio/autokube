name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true
        type: string

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: autokubeio/autokube

jobs:
  # ── Build & push image to Docker Hub ──────────────────────────────────────
  docker:
    name: Build and Push
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}

  # ── Sync version into Helm chart repo ─────────────────────────────────────
  update-chart:
    name: Update Helm Chart
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Skip if CHART_PAT is not configured
        env:
          CHART_PAT: ${{ secrets.CHART_PAT }}
        run: |
          if [ -z "${CHART_PAT}" ]; then
            echo "::notice::CHART_PAT secret not set — skipping chart update"
            exit 0
          fi

      - name: Checkout autokube-charts
        uses: actions/checkout@v4
        with:
          repository: autokubeio/autokube-charts
          token: ${{ secrets.CHART_PAT }}
          path: autokube-charts

      - name: Bump chart version to ${{ needs.docker.outputs.version }}
        run: |
          cd autokube-charts/charts/autokube
          sed -i "s/^version:.*/version: \"${{ needs.docker.outputs.version }}\"/"       Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ needs.docker.outputs.version }}\"/" Chart.yaml
          sed -i "s/tag:.*/tag: \"${{ needs.docker.outputs.version }}\"/"                values.yaml

      - name: Commit and push
        run: |
          cd autokube-charts
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/autokube/Chart.yaml charts/autokube/values.yaml
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: bump autokube to ${{ needs.docker.outputs.version }}" && git push)
