services:
  autokube:
    build:
      context: .
      dockerfile: Dockerfile
    image: autokube:latest
    container_name: autokube
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATA_DIR: /data
      # DATABASE_URL: postgres://user:pass@db:5432/autokube   # uncomment for Postgres
      ENCRYPTION_KEY: "your-base64-32-byte-key-here" # auto-generated if omitted
    volumes:
      - autokube-data:/data

  # ── Optional: Postgres backend ──────────────────────────────
  # db:
  #   image: postgres:17-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: autokube
  #     POSTGRES_PASSWORD: changeme
  #     POSTGRES_DB: autokube
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data

volumes:
  autokube-data:
  # postgres-data:
